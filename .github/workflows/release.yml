name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  check-trigger:
    name: Check Release Trigger
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.SHOULD_RELEASE }}
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if triggered by version tag
        id: check
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG_VERSION" == "${{ steps.version.outputs.VERSION }}" ]; then
              echo "SHOULD_RELEASE=true" >> $GITHUB_OUTPUT
              echo "Release triggered by version tag: v$TAG_VERSION"
            else
              echo "SHOULD_RELEASE=false" >> $GITHUB_OUTPUT
              echo "Tag version ($TAG_VERSION) doesn't match Cargo.toml (${{ steps.version.outputs.VERSION }})"
            fi
          else
            echo "SHOULD_RELEASE=false" >> $GITHUB_OUTPUT
            echo "Not triggered by a version tag"
          fi

  build:
    name: Build Binaries (${{ matrix.target }})
    needs: check-trigger
    if: needs.check-trigger.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version = ' crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev

      - name: Install cross-compilation toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Cache Rust dependencies
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.target }}

      - name: Build release (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p gity

      - name: Build release (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} -p gity

      - name: Package binary
        shell: bash
        run: |
          mkdir "gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}"
          cp README.md LICENSE "gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}/" 2>/dev/null || true
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/gity.exe" "gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}/"
            cd "gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}"
            7z a "../gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.zip" .
            echo "archive=gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/gity" "gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}/"
            tar -czvf "gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.tar.gz" -C "gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}" .
            echo "archive=gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.tar.gz" >> "$GITHUB_OUTPUT"
          fi
        id: package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gity-${{ matrix.target }}
          path: "gity-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.*"
          if-no-files-found: error

  attest:
    name: Attest Build Provenance
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gity-*

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'artifacts/**/*'

  create-github-release:
    name: Create GitHub Release
    needs: [build, attest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gity-*

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        run: |
          mkdir "gity-${{ steps.version.outputs.VERSION }}"
          mv artifacts/*/* "gity-${{ steps.version.outputs.VERSION }}/" 2>/dev/null || true
          ls -la "gity-${{ steps.version.outputs.VERSION }}/"

      - name: Create Checksums
        run: |
          cd "gity-${{ steps.version.outputs.VERSION }}"
          sha256sum * > "SHA256SUMS.txt"
          cat "SHA256SUMS.txt"

      - name: Build release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cat > release_notes.md <<EOF
          ## Gity v${VERSION}

          **Make large Git repositories feel instant.**

          ### Installation

          **cargo**
          \`\`\`bash
cargo install gity
\`\`\`

          **Homebrew**
          \`\`\`bash
brew tap neul-labs/tap
brew install gity
\`\`\`

          **npm**
          \`\`\`bash
npm install -g gity-cli
\`\`\`

          **pip**
          \`\`\`bash
pip install gity-cli
\`\`\`

          **GitHub Releases (binary)**
          Download pre-built binaries for Linux, macOS, and Windows from the assets below.

          ### Platforms

          | Platform | Architecture | Artifact |
          |----------|--------------|----------|
          | Linux    | x86_64       | \`.tar.gz\` |
          | Linux    | aarch64      | \`.tar.gz\` |
          | macOS    | x86_64       | \`.tar.gz\` |
          | macOS    | aarch64      | \`.tar.gz\` |
          | Windows  | x86_64       | \`.zip\`   |

          ### Supply Chain Security

          - **crates.io** — Published via [Trusted Publishing](https://crates.io/docs/trusted-publishing) (OIDC)
          - **PyPI** — Published via [Trusted Publishing](https://docs.pypi.org/trusted-publishers/) (OIDC)
          - **npm** — Published via [Trusted Publishing](https://docs.npmjs.com/generating-provenance-statements) with automatic provenance attestations
          - **GitHub Releases** — Binaries are attested with \`actions/attest-build-provenance\`

          Verify a release binary:
          \`\`\`bash
gh attestation verify gity-${VERSION}-x86_64-unknown-linux-gnu.tar.gz --owner neul-labs
\`\`\`

          ### Quick Start

          \`\`\`bash
gity register /path/to/large-repo
cd /path/to/large-repo
git status  # Fast!
\`\`\`

          See [CHANGELOG](https://github.com/neul-labs/gity/blob/main/CHANGELOG.md) for full details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Gity v${{ steps.version.outputs.VERSION }}
          body_path: ${{ github.workspace }}/release_notes.md
          files: |
            gity-${{ steps.version.outputs.VERSION }}/*
          generate_release_notes: true

  publish-cargo:
    name: Publish to crates.io
    needs: create-github-release
    runs-on: ubuntu-latest
    environment: cargo
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev

      - name: Authenticate with crates.io (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish gity-ipc
        run: cargo publish -p gity-ipc --token ${{ steps.auth.outputs.token }}

      - name: Publish gity-git
        run: cargo publish -p gity-git --token ${{ steps.auth.outputs.token }}

      - name: Publish gity-watch
        run: cargo publish -p gity-watch --token ${{ steps.auth.outputs.token }}

      - name: Publish gity-storage
        run: cargo publish -p gity-storage --token ${{ steps.auth.outputs.token }}

      - name: Publish gity-daemon
        run: cargo publish -p gity-daemon --token ${{ steps.auth.outputs.token }}

      - name: Publish gity-cli
        run: cargo publish -p gity-cli --token ${{ steps.auth.outputs.token }}

      - name: Publish gity
        run: cargo publish -p gity --token ${{ steps.auth.outputs.token }}

  publish-pypi:
    name: Publish to PyPI
    needs: create-github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/gity-cli/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build tools
        run: pip install build

      - name: Create PyPI package
        run: |
          mkdir -p pypi-package
          cp packages/pypi/* pypi-package/
          cp packages/pypi/README.md pypi-package/ 2>/dev/null || true
          cp LICENSE pypi-package/ 2>/dev/null || true
          sed -i "s/version = \".*\"/version = \"${{ steps.version.outputs.VERSION }}\"/" pypi-package/pyproject.toml
          cd pypi-package
          ls -la

      - name: Build package
        run: |
          cd pypi-package
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-package/dist/

  publish-npm:
    name: Publish to NPM
    needs: create-github-release
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/gity-cli
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare npm package
        run: |
          mkdir -p npm-package/binaries
          cp packages/npm/* npm-package/ 2>/dev/null || true
          cp packages/npm/README.md npm-package/ 2>/dev/null || true

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gity-x86_64-unknown-linux-gnu
          path: npm-package/binaries/

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gity-x86_64-apple-darwin
          path: npm-package/binaries/

      - name: Download macOS aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gity-aarch64-apple-darwin
          path: npm-package/binaries/

      - name: Download Windows x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gity-x86_64-pc-windows-msvc
          path: npm-package/binaries/

      - name: Update version in package.json
        run: |
          cd npm-package
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.version.outputs.VERSION }}\"/" package.json
          cat package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM (OIDC)
        run: cd npm-package && npm publish --provenance --access public

  publish-deb:
    name: Create DEB Package
    needs: create-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gity-x86_64-unknown-linux-gnu
          path: deb-package/

      - name: Install DEB packaging tools
        run: sudo apt-get install -y build-essential dh-make debhelper

      - name: Create DEB package
        run: |
          cd deb-package
          mkdir -p gity-${{ steps.version.outputs.VERSION }}-x86_64/usr/bin
          cp gity-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu/gity gity-${{ steps.version.outputs.VERSION }}-x86_64/usr/bin/
          cp ../packages/deb/debian/ gity-${{ steps.version.outputs.VERSION }}-x86_64/ -r
          cd gity-${{ steps.version.outputs.VERSION }}-x86_64
          sed -i "s/VERSION/${{ steps.version.outputs.VERSION }}/g" debian/changelog
          sed -i "s/VERSION/${{ steps.version.outputs.VERSION }}/g" debian/control
          dh_make -s -y --createorig
          dpkg-buildpackage -b -us -uc

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gity-deb
          path: deb-package/*.deb

  publish-arch:
    name: Create Arch Package (AUR)
    needs: create-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gity-x86_64-unknown-linux-gnu
          path: arch-package/

      - name: Prepare AUR package
        run: |
          cd arch-package
          mkdir -p gity-${{ steps.version.outputs.VERSION }}-x86_64
          cp gity-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu/gity gity-${{ steps.version.outputs.VERSION }}-x86_64/
          cp ../packages/arch/PKGBUILD .
          sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" PKGBUILD
          makepkg --nobuild --nodeps

      - name: Upload AUR package artifact
        uses: actions/upload-artifact@v4
        with:
          name: gity-aur
          path: arch-package/*.pkg.tar.zst

  publish-snap:
    name: Publish to Snap Store
    needs: create-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gity-x86_64-unknown-linux-gnu
          path: snap-package/

      - name: Prepare snap
        run: |
          cd snap-package
          cp gity-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu/gity .
          cp ../packages/snap/snapcraft.yaml .
          sed -i "s/version: .*/version: '${{ steps.version.outputs.VERSION }}'/" snapcraft.yaml

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        with:
          snapcraft.yaml: snap-package/snapcraft.yaml
          store: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

  publish-chocolatey:
    name: Publish to Chocolatey
    needs: create-github-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version = ' crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gity-x86_64-pc-windows-msvc
          path: chocolatey-package/

      - name: Prepare Chocolatey package
        shell: bash
        run: |
          cd chocolatey-package
          7z x -y "gity-${{ steps.version.outputs.VERSION }}-x86_64-pc-windows-msvc.zip" || true
          mkdir -p tools
          cp ../packages/chocolatey/gity.nuspec .
          sed -i "s/<version>.*<\/version>/<version>${{ steps.version.outputs.VERSION }}<\/version>/" gity.nuspec
          cp gity-${{ steps.version.outputs.VERSION }}-x86_64-pc-windows-msvc/gity.exe tools/ 2>/dev/null || cp gity.exe tools/ 2>/dev/null || true
          sha256sum tools/gity.exe | cut -d' ' -f1 > tools/VERIFICATION.txt
          echo "This package was installed from the official GitHub release." >> tools/VERIFICATION.txt

      - name: Push to Chocolatey
        uses: chocolatey-community/action-choco-push@v1
        with:
          apiKey: ${{ secrets.CHOCOLATEY_API_KEY }}
          packagePath: chocolatey-package/
          # Note: Requires manual review for first submission

  publish-homebrew:
    name: Update Homebrew Tap
    needs: create-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: gity

      - uses: actions/checkout@v4
        with:
          repository: neul-labs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' gity/crates/gity/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gity-x86_64-unknown-linux-gnu
          path: artifacts/

      - name: Calculate checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum "artifacts/gity-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        run: |
          cd homebrew-tap
          mkdir -p Formula
          cp ../gity/packages/homebrew/gity.rb.j2 Formula/gity.rb 2>/dev/null || echo "# Homebrew formula for gity" > Formula/gity.rb
          sed -i "s/version \".*\"/version \"${{ steps.version.outputs.VERSION }}\"/" Formula/gity.rb
          sed -i "s/sha256 \".*\"/sha256 \"${{ steps.checksum.outputs.CHECKSUM }}\"/" Formula/gity.rb
          cat Formula/gity.rb

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          title: Update gity to v${{ steps.version.outputs.VERSION }}
          body: |
            Update gity to version ${{ steps.version.outputs.VERSION }}

            See [CHANGELOG](https://github.com/neul-labs/gity/blob/main/CHANGELOG.md) for details.
          branch: update-gity-${{ steps.version.outputs.VERSION }}
          commit-message: "Update gity to v${{ steps.version.outputs.VERSION }}"
