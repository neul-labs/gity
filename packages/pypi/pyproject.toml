[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gity"
version = "0.1.0"
description = "Make large Git repositories feel instant - a lightweight daemon that accelerates Git operations"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
classifiers = [
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS :: MacOS X",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Rust",
    "Development Status :: 4 - Beta",
]
keywords = ["git", "fsmonitor", "performance", "daemon", "cli"]
authors = [
    {name = "Neul Labs", email = "hello@neul.ai"}
]

[project.urls]
Homepage = "https://github.com/neul-labs/gity"
Repository = "https://github.com/neul-labs/gity"
Changelog = "https://github.com/neul-labs/gity/blob/main/CHANGELOG.md"

[project.scripts]
gity = "gity.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
gity = ["README.md", "LICENSE"]
