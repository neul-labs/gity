[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gity"
version = "0.1.0"
description = "Make large Git repositories feel instant - a lightweight daemon that accelerates Git operations"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
classifiers = [
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS :: MacOS X",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Rust",
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Version Control :: Git",
]
keywords = [
    "git",
    "git-automation",
    "git-performance",
    "fsmonitor",
    "version-control",
    "developer-tools",
    "cli",
    "daemon",
    "prefetch",
    "git-status",
    "repo-management"
]
authors = [
    {name = "Dipankar Sarkar", email = "me@dipankar.name"},
    {name = "Neul Labs", email = "hello@neul.uk"}
]

[project.urls]
Homepage = "https://github.com/neul-labs/gity"
Repository = "https://github.com/neul-labs/gity"
Changelog = "https://github.com/neul-labs/gity/releases"
Issues = "https://github.com/neul-labs/gity/issues"

[project.scripts]
gity = "gity.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
gity = ["README.md", "LICENSE"]
