name: gity
version: "0.1.0"
summary: Make large Git repositories feel instant
description: |
  Gity accelerates Git operations by providing a background daemon that
  handles fsmonitor, prefetching, and maintenance tasks.

  Features:
  - Git fsmonitor integration for faster status commands
  - Background prefetch of remote refs
  - Automated maintenance scheduling
  - Cross-platform support (Linux, macOS, Windows)
  - Written in Rust for maximum performance

grade: stable
confinement: strict

apps:
  gity:
    command: usr/bin/gity
    plugs:
      - home
      - network

parts:
  gity:
    plugin: dump
    source: https://github.com/neul-labs/gity/releases/download/v$SNAPCRAFT_PROJECT_VERSION/gity-$SNAPCRAFT_PROJECT_VERSION-x86_64-unknown-linux-gnu.tar.gz
    stage-packages:
      - libgcc_s1
      - libc6
