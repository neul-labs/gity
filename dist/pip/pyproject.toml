[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gity"
version = "0.1.0"
description = "Make large Git repositories feel instant - a lightweight daemon that accelerates Git operations"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Neul Labs"}
]
keywords = ["git", "fsmonitor", "performance", "daemon", "cli"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Version Control :: Git",
]
requires-python = ">=3.8"

[project.urls]
Homepage = "https://github.com/neul-labs/gity"
Repository = "https://github.com/neul-labs/gity"
Documentation = "https://github.com/neul-labs/gity#readme"

[project.scripts]
gity = "gity:main"

[tool.setuptools.packages.find]
where = ["."]
